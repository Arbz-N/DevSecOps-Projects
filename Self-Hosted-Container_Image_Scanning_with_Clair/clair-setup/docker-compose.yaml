version: '3'
services:

  postgres:
    image: postgres:12
    restart: always
    container_name: clair-postgres
    environment:
      POSTGRES_PASSWORD: clairpassword
      POSTGRES_USER: clair
      POSTGRES_DB: clair
    volumes:
      - clair_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clair"]
      interval: 10s
      timeout: 5s
      retries: 5

  clair:
    image: quay.io/projectquay/clair:4.7.2
    restart: always
    container_name: clair
    ports:
      - "6060:6060"
      - "6061:6061"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/config
    environment:
      CLAIR_CONF: /config/config.yaml
      CLAIR_MODE: combo

volumes:
  clair_db: